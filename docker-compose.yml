# PostgreSQL para PapaScan — levanta la BD idéntica en cualquier SO.
#
#   docker compose up -d     # arranca Postgres en segundo plano
#   docker compose down      # lo detiene (los datos persisten en el volumen)
#
# La BD "papascan" se crea automáticamente. Credenciales: postgres/postgres
# (coinciden con los defaults de app/settings.py y .env.example).
services:
  db:
    image: postgres:17
    container_name: papascan-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: papascan
    ports:
      - "5432:5432"
    volumes:
      - papascan_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d papascan"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  papascan_pgdata:
